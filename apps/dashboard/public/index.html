<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Product Reliability Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Reliability Operations</p>
          <h1>Product Fleet</h1>
        </div>
        <div class="status-pill" id="fleet-status">Loading</div>
      </header>

      <section class="metrics" aria-label="Fleet metrics">
        <article><span id="product-count">0</span><small>Products</small></article>
        <article><span id="event-count">0</span><small>Events</small></article>
        <article><span id="error-count">0</span><small>Errors</small></article>
        <article><span id="monitor-count">0</span><small>Monitors</small></article>
      </section>

      <section class="grid">
        <div class="panel span-7">
          <div class="panel-head">
            <h2>Products</h2>
            <button id="refresh">Refresh</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Owner</th>
                  <th>Version</th>
                  <th>Status</th>
                  <th>Errors</th>
                  <th>Events</th>
                </tr>
              </thead>
              <tbody id="products"></tbody>
            </table>
          </div>
        </div>

        <div class="panel span-5">
          <div class="panel-head">
            <h2>Health</h2>
          </div>
          <div id="health-list" class="stack"></div>
        </div>

        <div class="panel span-6">
          <div class="panel-head">
            <h2>Recent Events</h2>
          </div>
          <div id="events" class="timeline"></div>
        </div>

        <div class="panel span-6">
          <div class="panel-head">
            <h2>Recent Errors</h2>
          </div>
          <div id="errors" class="timeline danger"></div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
