map $http_upgrade $connection_upgrade {
      default upgrade;
      "" close;
  }

  upstream hongrun_ai {
      server 127.0.0.1:3001;
  }

  upstream chronolife_app {
      server 127.0.0.1:3000;
  }

  upstream psychelog_app {
      server 127.0.0.1:3003;
  }

  upstream explainit_api {
      server 127.0.0.1:3004;
  }

  upstream hongrun_auth {
      server 127.0.0.1:3100;
  }

  upstream pomodoro_static {
      server 127.0.0.1:8080;
  }

  upstream chronoglobe_static {
      server 127.0.0.1:8081;
  }

  upstream mustdolist_app {
      server 127.0.0.1:3005;
  }

  upstream fangxia_app {
      server 127.0.0.1:3006;
  }

  upstream ai_product_reliability_app {
      server 127.0.0.1:8787;
  }

  server {
      listen 80;
      server_name
          hihongrun.com
          www.hihongrun.com
          explainit.hihongrun.com
          psychelog.hihongrun.com
          chronolife.hihongrun.com
          auth.hihongrun.com
          chronoglobe.hihongrun.com
          pomodoro.hihongrun.com
          mustdolist.hihongrun.com
          fangxia.hihongrun.com
          reliability.hihongrun.com;

      return 301 https://$host$request_uri;
  }

  server {
      listen 80 default_server;
      server_name _;

      return 301 https://hihongrun.com$request_uri;
  }

  server {
      listen 443 ssl http2 default_server;
      server_name _;

      ssl_certificate /etc/nginx/ssl/hihongrun-zerossl-fullchain.crt;
      ssl_certificate_key /etc/nginx/ssl/hihongrun-zerossl.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_prefer_server_ciphers off;
      ssl_ciphers HIGH:!aNULL:!MD5;
      ssl_session_cache shared:SSL:10m;

      return 301 https://hihongrun.com$request_uri;
  }

  server {
      listen 443 ssl http2;
      server_name hihongrun.com www.hihongrun.com;

      ssl_certificate /etc/nginx/ssl/hihongrun-zerossl-fullchain.crt;
      ssl_certificate_key /etc/nginx/ssl/hihongrun-zerossl.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_prefer_server_ciphers off;
      ssl_ciphers HIGH:!aNULL:!MD5;
      ssl_session_cache shared:SSL:10m;

      location = /explainit {
          return 301 https://explainit.hihongrun.com/;
      }

      location ^~ /explainit/ {
          rewrite ^/explainit/?(.*)$ https://explainit.hihongrun.com/$1 permanent;
      }

      location = /psychelog {
          return 301 https://psychelog.hihongrun.com/;
      }

      location ^~ /psychelog/ {
          rewrite ^/psychelog/?(.*)$ https://psychelog.hihongrun.com/$1 permanent;
      }

      location = /chronolife {
          return 301 https://chronolife.hihongrun.com/;
      }

      location ^~ /chronolife/ {
          rewrite ^/chronolife/?(.*)$ https://chronolife.hihongrun.com/$1 permanent;
      }

      location = /auth {
          return 301 https://auth.hihongrun.com/;
      }

      location ^~ /auth/ {
          rewrite ^/auth/?(.*)$ https://auth.hihongrun.com/$1 permanent;
      }

      location = /chronoglobe {
          return 301 https://chronoglobe.hihongrun.com/;
      }

      location = /chronoglobe.html {
          return 301 https://chronoglobe.hihongrun.com/;
      }

      location ^~ /chronoglobe/ {
          rewrite ^/chronoglobe/?(.*)$ https://chronoglobe.hihongrun.com/$1 permanent;
      }

      location = /pomodoro {
          return 301 https://pomodoro.hihongrun.com/;
      }

      location = /pomodoro/ {
          return 301 https://pomodoro.hihongrun.com/;
      }

      location ^~ /pomodoro/ {
          rewrite ^/pomodoro/?(.*)$ https://pomodoro.hihongrun.com/$1 permanent;
      }

      location = /mustdolist {
          return 301 https://mustdolist.hihongrun.com/;
      }

      location ^~ /mustdolist/ {
          rewrite ^/mustdolist/?(.*)$ https://mustdolist.hihongrun.com/$1 permanent;
      }

      location = /reliability {
          return 301 https://reliability.hihongrun.com/;
      }

      location ^~ /reliability/ {
          rewrite ^/reliability/?(.*)$ https://reliability.hihongrun.com/$1 permanent;
      }

      location ^~ /api/ {
          proxy_pass http://hongrun_ai;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_buffering off;
          proxy_cache off;
          proxy_connect_timeout 60s;
          proxy_send_timeout 180s;
          proxy_read_timeout 180s;
          add_header X-Accel-Buffering "no";
      }

      location / {
          proxy_pass http://hongrun_ai;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
          proxy_cache off;
      }
  }

  server {
      listen 443 ssl http2;
      server_name explainit.hihongrun.com;

      ssl_certificate /etc/nginx/ssl/hihongrun-zerossl-fullchain.crt;
      ssl_certificate_key /etc/nginx/ssl/hihongrun-zerossl.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_prefer_server_ciphers off;
      ssl_ciphers HIGH:!aNULL:!MD5;
      ssl_session_cache shared:SSL:10m;

      root /data/prod/explainit/dist;
      index index.html;

      location ^~ /api/ {
          proxy_pass http://explainit_api;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_buffering off;
          proxy_cache off;
          proxy_connect_timeout 60s;
          proxy_send_timeout 180s;
          proxy_read_timeout 180s;
          add_header X-Accel-Buffering "no";
      }

      location = /favicon.svg {
          try_files /favicon.svg =404;
          expires 30d;
          add_header Cache-Control "public";
      }

      location ^~ /assets/ {
          try_files $uri =404;
          expires 30d;
          add_header Cache-Control "public";
      }

      location / {
          try_files $uri $uri/ /index.html;
      }
  }

