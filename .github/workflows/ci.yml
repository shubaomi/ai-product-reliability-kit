name: production-v1-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: production-v1-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/dashboard/package-lock.json
            standard/package-lock.json
            cli/package-lock.json
            automation/package-lock.json
            sdks/node/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: npm ci
      - run: npm ci --prefix standard
      - run: npm ci --prefix apps/dashboard
      - run: npm ci --prefix cli
      - run: npm ci --prefix automation
      - run: npm ci
        working-directory: sdks/node
      - run: python -m pip install ./sdks/python
      - run: python -m pip check
      - run: npm pack --dry-run
        working-directory: sdks/node
      - run: npm --prefix standard test
      - run: npm test

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: apr_ci
          POSTGRES_USER: apr
          POSTGRES_PASSWORD: apr-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apr -d apr_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://apr:apr-ci-password@127.0.0.1:5432/apr_ci
      APR_TEST_DATABASE_URL: postgresql://apr:apr-ci-password@127.0.0.1:5432/apr_ci
      NODE_ENV: test
      APR_STORE_MODE: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            standard/package-lock.json
            apps/dashboard/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: npm ci --prefix standard
      - run: npm ci --prefix apps/dashboard
      - run: npm --prefix apps/dashboard run test:postgres
      - run: npm --prefix apps/dashboard run migrate
      - name: Backup, verify, and restore drill
        shell: bash
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" --no-psqlrc --set ON_ERROR_STOP=1 <<'SQL'
          insert into products (product_id, name, owner, standard_version, contract)
          values ('ci-restore-sentinel', 'CI restore sentinel', 'ci', '1.0.0', '{}'::jsonb)
          on conflict (product_id) do update set name = excluded.name;

          insert into telemetry_events (
            product_id, environment, release, event_name, idempotency_key, occurred_at, payload
          ) values (
            'ci-restore-sentinel', 'production', 'ci', 'ci.restore.sentinel',
            'ci-restore-sentinel-event', now(), '{"sentinel":true}'::jsonb
          ) on conflict do nothing;
          SQL
          backup_output="$(BACKUP_DIR="$RUNNER_TEMP/backups" BACKUP_LABEL=ci bash scripts/ops/backup-postgres.sh)"
          backup_file="$(printf '%s\n' "$backup_output" | sed -n 's/^BACKUP_FILE=//p' | tail -1)"
          test -n "$backup_file"
          BACKUP_FILE="$backup_file" bash scripts/ops/verify-backup.sh
          BACKUP_FILE="$backup_file" \
          DATABASE_ADMIN_URL=postgresql://apr:apr-ci-password@127.0.0.1:5432/postgres \
          DRILL_VERIFY_SQL="select 1 / case when exists (select 1 from products where product_id = 'ci-restore-sentinel') and exists (select 1 from telemetry_events where product_id = 'ci-restore-sentinel' and event_name = 'ci.restore.sentinel') then 1 else 0 end" \
          bash scripts/ops/restore-drill.sh

  java-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: sdks/java/pom.xml
      - run: mvn --batch-mode --no-transfer-progress -f sdks/java/pom.xml verify

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            standard/package-lock.json
            apps/dashboard/package-lock.json
      - run: npm ci
      - run: npm ci --prefix standard
      - run: npm ci --prefix apps/dashboard
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: .tmp/playwright-report/
          retention-days: 14

  operations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y nginx shellcheck rsync postgresql-client
      - run: bash -n deploy.sh rollback.sh scripts/ops/*.sh
      - run: shellcheck -x -P SCRIPTDIR deploy.sh rollback.sh scripts/ops/*.sh
      - run: npm run test:ops
      - name: Validate complete Nginx configuration
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /etc/nginx/ssl
          sudo openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -subj '/CN=hihongrun.com' \
            -keyout /etc/nginx/ssl/hihongrun-zerossl.key \
            -out /etc/nginx/ssl/hihongrun-zerossl-fullchain.crt
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo cp docs/nginx-hihongrun-production.conf /etc/nginx/conf.d/hihongrun.conf
          sudo nginx -t

  dependency-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/dashboard/package-lock.json
            standard/package-lock.json
            cli/package-lock.json
            automation/package-lock.json
            sdks/node/package-lock.json
      - run: npm ci
      - run: npm ci --prefix standard
      - run: npm ci --prefix apps/dashboard
      - run: npm ci --prefix cli
      - run: npm ci --prefix automation
      - run: npm ci
        working-directory: sdks/node
      - run: npm audit --audit-level=high
      - run: npm audit --prefix apps/dashboard --omit=dev --audit-level=high
      - run: npm audit --prefix standard --omit=dev --audit-level=high
      - run: npm audit --prefix cli --omit=dev --audit-level=high
      - run: npm audit --prefix automation --omit=dev --audit-level=high
      - run: npm audit --omit=dev --audit-level=high
        working-directory: sdks/node
